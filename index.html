<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecurePass - Gerador de Senhas Seguras</title>

<meta name="description" content="Gerador de senhas seguras usando criptografia do navegador.">

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1>🔒 SecurePass</h1>
    <p>Gerador de Senhas Seguras</p>

    <div class="card">

        <label>
            Comprimento:
            <span id="lengthValue">16</span>
        </label>

        <input
            type="range"
            min="8"
            max="64"
            value="16"
            id="length"
        >

        <div class="options">

            <label>
                <input type="checkbox" id="uppercase" checked>
                Letras Maiúsculas
            </label>

            <label>
                <input type="checkbox" id="lowercase" checked>
                Letras Minúsculas
            </label>

            <label>
                <input type="checkbox" id="numbers" checked>
                Números
            </label>

            <label>
                <input type="checkbox" id="symbols" checked>
                Caracteres Especiais
            </label>

        </div>

        <div class="password-box">
            <input
                type="text"
                id="password"
                readonly
                placeholder="Sua senha aparecerá aqui"
            >
        </div>

        <div class="buttons">
            <button id="generateBtn">
                Gerar Senha
            </button>

            <button id="copyBtn">
                Copiar
            </button>
        </div>

        <div class="strength">
            <div id="strengthBar"></div>
        </div>

        <p id="strengthText">Força da senha</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
